<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的第一个 H5</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, "PingFang SC", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px 30px;
            max-width: 400px;
        }
        h1 { font-size: 28px; margin-bottom: 16px; }
        p { font-size: 16px; line-height: 1.6; opacity: 0.9; }
        button {
            margin-top: 24px;
            padding: 12px 32px;
            border: none;
            border-radius: 50px;
            background: white;
            color: #764ba2;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🎉 上线成功！</h1>
        <p>这是我用 Vercel 部署的第一个网页。</p>
        <button onclick="alert('恭喜你成为站长！')">点我试试</button>
    </div>
</body>
</html>
